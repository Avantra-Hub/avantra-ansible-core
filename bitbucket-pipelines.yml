# This is an ubuntu 20.04 LTS based image
image: atlassian/default-image:3
options:
  docker: true
pipelines:
  branches:
    release/*:
      - parallel:
          - step:
              name: 'Test: Ansible 2.16 (python-3.12)'
              image: python:3.12-bullseye
              script:
                - ./scripts/test.sh 3.12 2.16
          - step:
              name: 'Test: Ansible 2.17 (devel) (python-3.12)'
              image: python:3.12-bullseye
              script:
                - ./scripts/test-devel.sh 3.12
          - step:
              name: 'Test: Ansible 2.14-16 (python-3.11)'
              image: python:3.11-bullseye
              script:
                - ./scripts/test.sh 3.11 2.14 2.15 2.16
          - step:
              name: 'Test: Ansible 2.17 (devel) (python-3.10)'
              image: python:3.11-bullseye
              script:
                - ./scripts/test-devel.sh 3.11
          - step:
              name: 'Test: Ansible 2.14-16 (python-3.10)'
              image: python:3.10-bullseye
              script:
                - ./scripts/test.sh 3.10 2.14 2.15 2.16
          - step:
              name: 'Test: Ansible 2.17 (devel) (python-3.10)'
              image: python:3.10-bullseye
              script:
                - ./scripts/test-devel.sh 3.10
          - step:
              name: 'Test: Ansible 2.14-15 (python-3.9)'
              image: python:3.9-bullseye
              script:
                - ./scripts/test.sh 3.9 2.14 2.15
      - step:
          name: 'Build with Ansible 2.16 and python-3.12'
          image: python:3.12-bullseye
          script:
            - ./scripts/build.sh 2.16
          artifacts:
            - build/**
      - step:
          name: 'Build Documentation'
          image: python:3.10-bullseye
          script:
            - ./scripts/build-docu.sh 2.16
          artifacts:
            - build/**
