# This is an ubuntu 20.04 LTS based image
image: atlassian/default-image:3
options:
  docker: true
pipelines:
  branches:
    release/*:
      - parallel:
          - step:
              name: 'Test: Ansible 2.17 (python-3.10)'
              image: python:3.10-bullseye
              script:
                - ./scripts/test.sh 3.10 2.17
          - step:
              name: 'Test: Ansible 2.17 (python-3.11)'
              image: python:3.11-bullseye
              script:
                - ./scripts/test.sh 3.11 2.17
          - step:
              name: 'Test: Ansible 2.17 (python-3.12)'
              image: python:3.12-bullseye
              script:
                - ./scripts/test.sh 3.12 2.17
          - step:
              name: 'Test: Ansible 2.18 (python-3.11)'
              image: python:3.11-bullseye
              script:
                - ./scripts/test.sh 3.11 2.18
          - step:
              name: 'Test: Ansible 2.18 (python-3.12)'
              image: python:3.12-bullseye
              script:
                - ./scripts/test.sh 3.12 2.18
          - step:
              name: 'Test: Ansible 2.18 (python-3.13)'
              image: python:3.13-bullseye
              script:
                - ./scripts/test.sh 3.13 2.18
          - step:
              name: 'Test: Ansible 2.16 (python-3.10)'
              image: python:3.10-bullseye
              script:
                - ./scripts/test.sh 3.10 2.16
          - step:
              name: 'Test: Ansible 2.16 (python-3.11)'
              image: python:3.11-bullseye
              script:
                - ./scripts/test.sh 3.11 2.16
          - step:
              name: 'Test: Ansible 2.16 (python-3.12)'
              image: python:3.12-bullseye
              script:
                - ./scripts/test.sh 3.12 2.16
          - step:
              name: 'Test: Ansible 2.19 (python-3.11)'
              image: python:3.11-bullseye
              script:
                - ./scripts/test-devel.sh 3.11 2.19
          - step:
              name: 'Test: Ansible 2.19 (python-3.12)'
              image: python:3.12-bullseye
              script:
                - ./scripts/test-devel.sh 3.12 2.19
          - step:
              name: 'Test: Ansible 2.19 (python-3.13)'
              image: python:3.13-bullseye
              script:
                - ./scripts/test-devel.sh 3.13 2.19
      - step:
          name: 'Build with Ansible 2.18 and python-3.12'
          image: python:3.12-bullseye
          script:
            - ./scripts/build.sh 2.18
          artifacts:
            - build/**
      - step:
          name: 'Build Documentation'
          image: python:3.12-bullseye
          script:
            - ./scripts/build-docu.sh 2.18
          artifacts:
            - build/**
