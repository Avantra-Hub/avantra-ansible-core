# This is an ubuntu 20.04 LTS based image
image: atlassian/default-image:3
options:
  docker: true
pipelines:
  default:
    - parallel:
      - step:
          name: 'Test: Ansible 2.12 (python-3.9)'
          image: python:3.10-bullseye
          script:
            - ./scripts/test.sh 2.12 2.13
      - step:
          name: 'Test: Ansible 2.13 (python-3.9)'
          image: python:3.10-bullseye
          script:
            - ./scripts/test.sh 2.13 2.14
      - step:
          name: 'Test: Ansible 2.14 (python-3.9)'
          image: python:3.10-bullseye
          script:
            - ./scripts/test.sh 2.14 2.15
    - step:
        name: 'Build'
        script:
          - ./scripts/build.sh
    - step:
        name: 'Build Documentation'
        script:
          - ./scripts/build-docu.sh
       
      
