ancestor: null
releases:
  23.0.2:
    changes:
      release_summary: This release fixed some minor bugs.
    fragments:
    - 23.0.2.release_summary.yml
    release_date: '2022-11-11'
  24.0.0:
    changes:
      release_summary: 'This version of the collection was released to support the
        Ansible versions: 2.14, 2.15, 2.16'
    fragments:
    - 24.0.0.release_summary.yml
    release_date: '2024-02-02'
  25.2.0:
    release_date: '2026-02-13'
  25.3.0:
    changes:
      bugfixes:
      - api - Remove ``soapenv:mustUnderstand`` attribute from SOAP security header
        to fix compatibility issues.
      - sapsystem - Disable ``monitoring`` field in SAP system update to prevent unintended
        changes.
      - server - Disable ``monitoring`` field in server update to prevent unintended
        changes.
      minor_changes:
      - collection - Update ``requires_ansible`` to ``>=2.16.0`` for Red Hat Automation
        Hub certification compliance.
      - collection - Add Support and Release Notes sections to README per Red Hat
        certified collection requirements.
      - collection - Add automated publishing to Red Hat Automation Hub in release
        workflow.
      - collection - Remove Python 3.10 and 3.11 from test matrix, require Python
        >=3.12.
      - sapsystem - Support ``withSapControl`` and ``withoutSapControl`` remote monitoring
        modes.
      - sapsystem - Use new ``remoteOptions`` API structure for remote monitoring
        configuration, replacing the flat ``remoteMonitoringEntryPoint`` and ``remoteMonitoringServerSystemId``
        fields.
      - server - Add log message on successful server creation.
      - server - Improve error messages for missing ``system_role`` and ``fqdn_or_ip_address``
        arguments during server creation.
      release_summary: Release for Red Hat Automation Hub certification. Updates minimum
        Ansible requirement to 2.16.0, adds Support section to README, and includes
        automated Automation Hub publishing. Also includes SOAP API compatibility fixes,
        improved remote monitoring for SAP systems, and better server module error
        handling.
    fragments:
    - 25.2.0-api-soap-header.yml
    - 25.2.0-disable-monitoring-update.yml
    - 25.2.0-sapsystem-remote-options.yml
    - 25.2.0-server-error-messages.yml
    - 25.3.0-release-summary.yml
    release_date: '2026-03-03'
  25.3.1:
    changes:
      bugfixes:
      - server - Fix monitoring toggle logic inverting the ``monitor_off`` state.
      - server - Return snake_case response from monitoring toggle mutations.
      - server - Fix GraphQL ``MONI_OFF_MUTATION`` missing ``DateTime`` type for ``$until``
        parameter.
      - server - Apply expected monitoring state directly instead of relying on stale
        API cache response.
      - sapsystem - Fix monitoring toggle logic inverting the ``monitor_off`` state.
      - sapsystem - Return snake_case response from monitoring toggle mutations.
      - sapsystem - Apply expected monitoring state directly instead of relying on stale
        API cache response.
      minor_changes:
      - auth_options - Add ``validate_certs`` option to disable SSL certificate verification
        for self-signed certificates.
      - login - Add ``validate_certs`` to login module argument spec.
      release_summary: Bugfix release addressing monitoring toggle logic, SSL certificate
        validation support, and GraphQL mutation syntax. Adds ``validate_certs`` option
        to all modules.
    release_date: '2026-03-06'
