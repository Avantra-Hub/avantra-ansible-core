ancestor: null
releases:
  23.0.2:
    changes:
      release_summary: This release fixed some minor bugs.
    fragments:
    - 23.0.2.release_summary.yml
    release_date: '2022-11-11'
  24.0.0:
    changes:
      release_summary: 'This version of the collection was released to support the
        Ansible versions: 2.14, 2.15, 2.16'
    fragments:
    - 24.0.0.release_summary.yml
    release_date: '2024-02-02'
  25.2.0:
    release_date: '2026-02-13'
  25.3.0:
    changes:
      bugfixes:
      - api - Remove ``soapenv:mustUnderstand`` attribute from SOAP security header
        to fix compatibility issues.
      - sapsystem - Disable ``monitoring`` field in SAP system update to prevent unintended
        changes.
      - server - Disable ``monitoring`` field in server update to prevent unintended
        changes.
      minor_changes:
      - collection - Add Support and Release Notes sections to README per Red Hat
        certified collection requirements.
      - collection - Add automated publishing to Red Hat Automation Hub in release
        workflow.
      - collection - Remove Python 3.10 and 3.11 from test matrix, require Python
        >=3.12.
      - collection - Update ``requires_ansible`` to ``>=2.16.0`` for Red Hat Automation
        Hub certification compliance.
      - sapsystem - Support ``withSapControl`` and ``withoutSapControl`` remote monitoring
        modes.
      - sapsystem - Use new ``remoteOptions`` API structure for remote monitoring
        configuration, replacing the flat ``remoteMonitoringEntryPoint`` and ``remoteMonitoringServerSystemId``
        fields.
      - server - Add log message on successful server creation.
      - server - Improve error messages for missing ``system_role`` and ``fqdn_or_ip_address``
        arguments during server creation.
      release_summary: Release for Red Hat Automation Hub certification. Updates minimum
        Ansible requirement to 2.16.0, adds Support section to README, and includes
        automated Automation Hub publishing. Also includes SOAP API compatibility
        fixes, improved remote monitoring for SAP systems, and better server module
        error handling.
    fragments:
    - 25.2.0-api-soap-header.yml
    - 25.2.0-disable-monitoring-update.yml
    - 25.2.0-sapsystem-remote-options.yml
    - 25.2.0-server-error-messages.yml
    - 25.3.0-release-summary.yml
    release_date: '2026-03-03'
  25.3.1:
    changes:
      bugfixes:
      - sapsystem - Apply expected monitoring state directly instead of relying on
        stale API cache response.
      - sapsystem - Fix monitoring toggle logic inverting the ``monitor_off`` state.
      - sapsystem - Return snake_case response from monitoring toggle mutations.
      - server - Apply expected monitoring state directly instead of relying on stale
        API cache response.
      - server - Fix GraphQL ``MONI_OFF_MUTATION`` missing ``DateTime`` type for ``$until``
        parameter.
      - server - Fix monitoring toggle logic inverting the ``monitor_off`` state.
      - server - Return snake_case response from monitoring toggle mutations.
      minor_changes:
      - auth_options - Add ``validate_certs`` option to disable SSL certificate verification
        for self-signed certificates.
      - login - Add ``validate_certs`` to login module argument spec.
      release_summary: Bugfix release addressing monitoring toggle logic, SSL certificate
        validation support, and GraphQL mutation syntax. Adds ``validate_certs`` option
        to all modules.
    release_date: '2026-03-06'
  25.3.2:
    changes:
      minor_changes:
      - Add Galaxy publish approval gate via ``galaxy-publish`` GitHub Environment.
      - Add PR template with changelog fragment reminder.
      - Add ``RELEASE-PROCESS.md`` documenting the release workflow.
      - Add tag/version validation that blocks Galaxy publish on mismatch.
      - Remove Bitbucket Pipelines configuration and legacy build scripts in favor
        of GitHub Actions.
      - Split CI into separate test (``ci.yml``) and release (``release.yml``) workflows.
    fragments:
    - remove-bitbucket-pipelines.yml
    - split-ci-release-workflows.yml
    release_date: '2026-03-06'
  25.3.3:
    changes:
      bugfixes:
      - Fix Automation Hub token exchange to use ansible.cfg auth_url for offline-to-access
        token swap (https://github.com/Avantra-Hub/avantra-ansible-core/pull/11).
      - Fix ansible-lint violations (yaml[empty-lines], yaml[octal-values], yaml[brackets])
        for Automation Hub certification (https://github.com/Avantra-Hub/avantra-ansible-core/pull/17).
      - Fix monitoring toggle, SSL certificate validation, and version bump handling
        (https://github.com/Avantra-Hub/avantra-ansible-core/pull/12).
      minor_changes:
      - Add GitHub Pages deployment for collection documentation (https://github.com/Avantra-Hub/avantra-ansible-core/pull/15).
      - Add ``validate_certs`` option to ``auth_options`` doc fragment (https://github.com/Avantra-Hub/avantra-ansible-core/pull/12).
      - Add approval gate and parallelize Galaxy/Automation Hub publish jobs in release
        workflow (https://github.com/Avantra-Hub/avantra-ansible-core/pull/10).
      - Add integration test framework with GraphQL API mock and API documentation
        (https://github.com/Avantra-Hub/avantra-ansible-core/pull/12).
      - Add pre-push checklist documentation for sanity, unit, and lint checks (https://github.com/Avantra-Hub/avantra-ansible-core/pull/12).
      - Add unit tests for server, sapsystem, and customer modules (https://github.com/Avantra-Hub/avantra-ansible-core/pull/12).
      - Expand CI matrix with ansible-core 2.20, 2.21 (devel), and Python 3.14 (https://github.com/Avantra-Hub/avantra-ansible-core/pull/9).
      - Prepare collection for Red Hat Automation Hub certification (https://github.com/Avantra-Hub/avantra-ansible-core/pull/9).
      release_summary: 'Maintenance release with Red Hat Automation Hub certification,

        ansible-lint compliance, expanded CI matrix, integration test

        framework, and documentation improvements.

        '
      security_fixes:
      - Replace hardcoded credentials with Ansible Vault variable references in integration
        test playbooks (https://github.com/Avantra-Hub/avantra-ansible-core/pull/12).
    fragments:
    - v25.3.3.yml
    release_date: '2026-03-11'
