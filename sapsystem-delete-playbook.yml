# ansible-playbook simple-playbook.yml
- hosts: localhost
  vars:
    avantra_api_url: http://localhost:8090/xn
    avantra_api_user: mis2
    avantra_api_password: 111111111111

  tasks:

    - name: Login to Avantra API and fetch a token
      avantra.core.login:
      register: auth

    - name: Print return information from the previous task
      ansible.builtin.debug:
        var: auth.token

    - name: "Delete server: achnmc-mis2"
      avantra.core.sapsystem_delete:
        avantra_token: "{{auth.token}}"
        unified_sap_sid: "SMA_REMOTE2"
        customer_name: "mis"
      register: delete_sap_system

    - name: delete_sap_system
      ansible.builtin.debug:
        var: delete_sap_system
