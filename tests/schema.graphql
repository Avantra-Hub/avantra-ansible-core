"""
Interface for a monitored system
"""
interface MonitoredSystem implements InfoProvider {
    id: ID!
    """
    The numeric monitored system type.
    0 = Server
    1 = SapInstance
    2 = SapSystem
    3 = Database (can be StandaloneDatabase or SapSystemDatabase)
    (4 = BusinessService)
    5 = SapBusinessObject
    6 = CloudService
    """
    mst: Int!
    """
    Get all the available RTM checks for the given status selection. If the call should return different
    kind of checks the filter input has to be used with the explicit value for the kind field. If there is
    no kind filter field defined it defaults to:
    {
    name: "kind"
    operator: eq
    value: "RTM"
    }
    """
    checks(
        where: FilterInput
        order: OrderInput
    ): [Check!]!

    # Count the affected checks.
    checkCount(
        # The filter conditions for this query.
        where: FilterInput
    ): Int!

    """
    Get a check count summary.
    """
    checkCountSummary: CheckCountSummary!

    #
    checksRelay (
        first: Int
        after: String
        where: FilterInput
        order: OrderInput
    ): CheckConnection

    """
    Get all the possible system actions. They can be used with mutation executeSystemAction(...).
    """
    actions(actionType: [SystemActionType!] = [Start, Stop, Restart]): [SystemAction!]!

    """
    Custom attributes defined for this monitored system.
    """
    customAttributes: [CustomAttribute!]!
    """
    Special data for this monitored system
    """
    customData: String
    """
    The associated customer for this system.
    """
    customer: Customer!
    description: String
    maintenance: Boolean
    monitorOff: Boolean
    monitorOffUntil: DateTime
    monitorSwitchReason: String
    monitorSwitchDate: DateTime
    name: String
    operational: Boolean
    operationalSince: Date
    operationalUntil: Date
    """
    The role of this system.
    """
    systemRole: String
    timestamp: DateTime
    type: MonitoredSystemType!
    uuid: String
    # The status of the monitored system
    status: Status!
    """
    The check status as number:
    2 => CRITICAL
    1 => WARNING
    0 => OK
    -1 => UNKNOWN
    -2 => DISABLED
    """
    statusId: Int!
    """
    This field holds information about the available performance resources for this monitored system.
    """
    performance: MonitoredSystemPerformanceData
    """
    Who is responsible as administrator for this system.
    """
    administrator: User
    """
    Who is responsible as administrator deputy for this system.
    """
    administratorDeputy: User
    """
    Is this a remote system
    """
    remote: Boolean!
    """
    Information about this monitored system.
    """
    info: [InfoNode] @uionly
    """
    The application type of this monitored system.
    """
    applicationType: String
    """
    The assigned SLA (service level agreement).
    """
    assignedSLA: ServiceLevelAgreement
    """
    The monitor level
    """
    monitorLevel: MonitorLevel!
    """
    Available credentials for this system.
    """
    credentials: [CredentialsBase]!
}

