"""
"""
enum FilterOperator {
    like
    eq
    isNull
    gt
    lt
    ge
    le
    isIn
}

"""
"""
input FilterByInput {
    name: String!
    operator: FilterOperator!
    value: String
    values: [String]
    negate: Boolean = false
}

"""
Filter which parts are AND combined. Does not support OR at
the moment. Negate can be used if the negate flag on the by
input is set to true. All the given possibilities to filter
the content intersects with each other (filterBy AND searchTerm
AND selectorIds).
"""
input FilterInput {
    """
    A list of filter expression on fields.
    """
    filterBy: [FilterByInput!]!

    """
    A search term
    """
    searchTerm: String

    """
    The selectorIds to filter the content. Make sure the selector's
    object type corresponds to the resulting type. Otherwise a selector
    will be ignored. An empty selector ID list and a null list will be
    ignored.
    """
    selectorIds: [ID!]

}


