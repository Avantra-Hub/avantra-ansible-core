type SapBusinessObject implements MonitoredSystem & InfoProvider {
    id: ID!
    """
    The numeric monitored system type.
    0 = Server
    1 = SapInstance
    2 = SapSystem
    3 = Database (can be StandaloneDatabase or SapSystemDatabase)
    (4 = BusinessService)
    5 = SapBusinessObject
    6 = CloudService
    """
    mst: Int!
    """
    Get all the available RTM checks for the given status selection. If the call should return different
    kind of checks the filter input has to be used with the explicit value for the kind field. If there is
