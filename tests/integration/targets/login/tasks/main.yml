- name: Login to an non-existent endpoint
  avantra.core.login:
    avantra_api_url: http://localhost:8090/xn
    avantra_api_user: anyone
    avantra_api_password: dontknow
  ignore_errors: yes
  register: result

- name: Test the output
  assert:
    that:
      - result.status == -1

- name: Login to an existent endpoint with wrong credentials
  avantra.core.login:
    avantra_api_url: http://localhost:8888/xn
    avantra_api_user: anyone
    avantra_api_password: dontknow
  ignore_errors: yes
  register: result

- name: Test the output
  assert:
    that:
      - result.status == 401


- name: Login to an existent endpoint with correct credentials
  avantra.core.login:
    avantra_api_url: http://localhost:8888/xn
    avantra_api_user: testuser
    avantra_api_password: testpwd
  register: result

- name: Test the output
  assert:
    that:
      - result.token == "###TestToken###"

