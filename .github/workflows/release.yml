name: Release

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this?"
        required: false
        default: "Manual release"
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read

env:
  ANSIBLE_TARGET_VERSION: "2.18"

jobs:

  ###############################################################################################
  # Run Tests
  ###############################################################################################
  tests:
    name: Test matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ansible-version: ['2.16', '2.17', '2.18', '2.19', '2.20', 'devel']
        python-version: ['3.12', '3.13', '3.14']
        exclude:
          # Ansible 2.16, 2.17 only support up to Python 3.12
          - ansible-version: '2.16'
            python-version: '3.13'
          - ansible-version: '2.16'
            python-version: '3.14'
          - ansible-version: '2.17'
            python-version: '3.13'
          - ansible-version: '2.17'
            python-version: '3.14'
          # Ansible 2.18, 2.19 do not support Python 3.14
          - ansible-version: '2.18'
            python-version: '3.14'
          - ansible-version: '2.19'
            python-version: '3.14'

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Ansible Core
        run: |
          if [ "${{ matrix.ansible-version }}" = "devel" ]; then
            python -m pip install "ansible-core @ https://github.com/ansible/ansible/archive/devel.tar.gz"
          else
            python -m pip install "ansible-core==${{ matrix.ansible-version }}.*"
          fi

      - name: Setup Collection Structure
        run: |
          COLLECTION_PATH="${{ runner.temp }}/tests-${{ matrix.ansible-version }}/ansible_collections/avantra/core"

          echo "Setting up collection at: $COLLECTION_PATH"
          mkdir -p "$COLLECTION_PATH"

          cp -r . "$COLLECTION_PATH"

          cd "$COLLECTION_PATH"
          rm -rf scripts
          echo "COLLECTION_PATH=$COLLECTION_PATH" >> $GITHUB_ENV

      - name: Run Sanity Tests
        working-directory: ${{ env.COLLECTION_PATH }}
        run: |
          ansible-test sanity --junit --python "${{ matrix.python-version }}" --verbose

      - name: Run Unit Tests
        working-directory: ${{ env.COLLECTION_PATH }}
        run: |
          ansible-test units --coverage --python "${{ matrix.python-version }}" --requirements --verbose

      - name: Generate Coverage Report
        working-directory: ${{ env.COLLECTION_PATH }}
        run: |
          ansible-test coverage report --requirements

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: test-results-${{ matrix.python-version }}-${{ matrix.ansible-version }}
          path: ${{ env.COLLECTION_PATH }}/tests/output/junit/*.xml


  ###############################################################################################
  # Validate Tag vs galaxy.yml Version
  ###############################################################################################
  validate-tag:
    name: Validate tag matches galaxy.yml
    runs-on: ubuntu-latest
    needs: tests
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Set up Python 3.12
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.12'

      - name: Compare tag with galaxy.yml version
        run: |
          python3 -m pip install pyyaml
          GALAXY_VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('galaxy.yml')).get('version'))")
          TAG_VERSION="${{ github.ref_name }}"

          echo "galaxy.yml version: $GALAXY_VERSION"
          echo "Git tag: $TAG_VERSION"

          if [ "$GALAXY_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — galaxy.yml has '$GALAXY_VERSION' but git tag is '$TAG_VERSION'"
            exit 1
          fi

          echo "Versions match."

      - name: Verify changelog entry exists
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          if ! grep -q "^v${TAG_VERSION}$" CHANGELOG.rst; then
            echo "::error::No changelog entry found for v${TAG_VERSION} in CHANGELOG.rst"
            exit 1
          fi
          echo "Changelog entry found for v${TAG_VERSION}."


  ###############################################################################################
  # Build Collection Artifact
  ###############################################################################################
  build:
    name: Build collection
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Set up Python 3.12
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Prepare Directory Structure
        run: |
          TARGET_PATH="${{ runner.temp }}/ansible_collections/avantra/core"
          mkdir -p "$TARGET_PATH"
          cp -r . "$TARGET_PATH"
          echo "COLLECTION_ROOT=$TARGET_PATH" >> $GITHUB_ENV

      - name: Install Dependencies and Build
        working-directory: ${{ env.COLLECTION_ROOT }}
        run: |
          python -m pip install "ansible-core==${{ env.ANSIBLE_TARGET_VERSION }}.*"
          mkdir -p ${{ github.workspace }}/build
          ansible-galaxy collection build --output-path ${{ github.workspace }}/build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: avantra-core-collection
          path: ${{ github.workspace }}/build/*.tar.gz


  ###############################################################################################
  # Build Documentation
  ###############################################################################################
  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Set up Python 3.12
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Install Python Helper Dependencies
        run: python3 -m pip install pyyaml

      - name: Get Collection Version
        id: get_version
        run: |
          VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('galaxy.yml')).get('version'))")
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Build Artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: avantra-core-collection
          path: build/

      - name: Install Ansible Core and Collection
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          python3 -m pip install "ansible-core==${{ env.ANSIBLE_TARGET_VERSION }}.*"
          ansible-galaxy collection install "build/avantra-core-${{ env.VERSION }}.tar.gz"

      - name: Setup Documentation Tools
        run: |
          python3 -m pip install antsibull-docs sphinx_ansible_theme

      - name: Build Sphinx Documentation
        run: |
          CURRENT_DIR=$(pwd)
          TARGET_DIR="$CURRENT_DIR/target/ansible-docu"
          DEST_DIR="$TARGET_DIR/dest"

          mkdir -p "$TARGET_DIR"

          echo "---- [INIT SPHINX] ----"
          mkdir -p -m 700 "$DEST_DIR"

          cd "$TARGET_DIR"
          antsibull-docs sphinx-init --use-current --dest-dir dest avantra.core

          cd dest

          echo "---- [BUILD DOCU (Temp RST)] ----"
          mkdir -p temp-rst
          chmod -R 700 temp-rst

          antsibull-docs \
              collection \
              --use-current \
              --dest-dir temp-rst \
              avantra.core

          echo "---- [RSYNC] ----"
          if [ ! -d "rst" ]; then
            mkdir -m 700 "rst"
          fi

          rsync -cprv --delete-after temp-rst/collections/ rst/collections/

          echo "---- [SPHINX BUILD] ----"
          sphinx-build -M html rst build -c . -W --keep-going

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: ansible-documentation-html
          path: target/ansible-docu/dest/build/html/


  ###############################################################################################
  # Approve Publish (single manual approval gate for both publish jobs)
  ###############################################################################################
  approve-publish:
    name: Approve publish
    runs-on: ubuntu-latest
    needs:
      - build
      - docs
      - validate-tag
    if: startsWith(github.ref, 'refs/tags/')
    environment: publish-approval
    steps:
      - name: Approval confirmed
        run: echo "Publishing approved"


  ###############################################################################################
  # Publish to Red Hat Automation Hub
  ###############################################################################################
  publish-automation-hub:
    name: Publish to Automation Hub
    runs-on: ubuntu-latest
    needs: approve-publish
    environment: automation-hub-publish

    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.12'

      - name: Install Ansible Core
        run: python -m pip install "ansible-core==${{ env.ANSIBLE_TARGET_VERSION }}.*"

      - name: Download Build Artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: avantra-core-collection
          path: build/

      - name: Publish Collection
        env:
          AH_TOKEN: ${{ secrets.AH_TOKEN }}
        run: |
          cat > ansible.cfg <<EOF
          [galaxy]
          server_list = automation_hub

          [galaxy_server.automation_hub]
          url=https://cloud.redhat.com/api/automation-hub/
          auth_url=https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          token=$AH_TOKEN
          EOF

          ansible-galaxy collection publish build/*.tar.gz
          rm -f ansible.cfg


  ###############################################################################################
  # Publish to Ansible Galaxy (parallel with Automation Hub)
  ###############################################################################################
  publish-galaxy:
    name: Publish to Ansible Galaxy
    runs-on: ubuntu-latest
    needs: approve-publish
    environment: galaxy-publish

    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.12'

      - name: Install Ansible Core
        run: python -m pip install "ansible-core==${{ env.ANSIBLE_TARGET_VERSION }}.*"

      - name: Download Build Artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: avantra-core-collection
          path: build/

      - name: Publish Collection
        run: |
          ansible-galaxy collection publish build/*.tar.gz --api-key "${{ secrets.GALAXY_API_KEY }}"


  ###############################################################################################
  # Create GitHub Release
  ###############################################################################################
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - publish-galaxy
      - publish-automation-hub
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Download Build Artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: avantra-core-collection
          path: build/

      - name: Extract Changelog for Version
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"

          # Extract the section for this version from CHANGELOG.rst
          # Matches from "vX.Y.Z" header until the next version header or end of file
          NOTES=$(awk -v tag="v${TAG}" '
            BEGIN { found=0 }
            $0 ~ "^" tag "$" { found=1; next }
            found && /^v[0-9]+\.[0-9]+\.[0-9]+$/ { exit }
            found && /^=+$/ { next }
            found { print }
          ' CHANGELOG.rst)

          # Write to file to avoid quoting issues
          echo "$NOTES" > /tmp/changelog-notes.md

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "v${TAG}" \
            --notes-file /tmp/changelog-notes.md \
            --generate-notes \
            build/*.tar.gz


  ###############################################################################################
  # Deploy Documentation to GitHub Pages
  ###############################################################################################
  deploy-docs:
    name: Deploy documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - publish-automation-hub
      - publish-galaxy
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download Documentation Artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: ansible-documentation-html
          path: docs-html/

      - name: Extract Tag Version
        id: version
        run: |
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages for Historical Versions
        id: checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          ref: gh-pages
          path: gh-pages-dir
          fetch-depth: 1
        continue-on-error: true

      - name: Assemble Full Site
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p site

          # Copy only semver version directories from gh-pages (skip junk files)
          if [ -d "gh-pages-dir" ]; then
            echo "Copying historical version directories from gh-pages..."
            for dir in gh-pages-dir/*/; do
              dirname=$(basename "$dir")
              if echo "$dirname" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                echo "  Copying $dirname"
                cp -r "$dir" "site/$dirname"
              fi
            done
          else
            echo "No gh-pages branch found, starting fresh."
          fi

          # Add the new version's documentation
          echo "Adding documentation for version $TAG"
          rm -rf "site/$TAG"
          cp -r docs-html "site/$TAG"

          # Find the latest semver among all version directories
          LATEST=$(find site -maxdepth 1 -mindepth 1 -type d \
            -name '[0-9]*' -printf '%f\n' \
            | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)

          echo "Latest version: $LATEST"

          # Generate root index.html with redirect to latest version
          cat > site/index.html << HEREDOC
          <!DOCTYPE html>
          <html><head>
            <meta http-equiv="refresh" content="0; url=./$LATEST/">
          </head><body>
            <p>Redirecting to <a href="./$LATEST/">$LATEST</a>...</p>
          </body></html>
          HEREDOC

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
